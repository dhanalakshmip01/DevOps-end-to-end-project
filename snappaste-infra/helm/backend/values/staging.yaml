global:
  environment: staging
  namespace: snappaste

image:
  repository: ""   # set by pipeline
  tag: latest
  pullPolicy: Always

replicaCount: 2

port: 8000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  DATABASE_URL: "postgresql://snappaste:snappaste@postgres:5432/snappaste"

ingress:
  enabled: true
  className: alb
  host: "staging.snappaste.internal"
